[mypy]
python_version = 3.11
strict = True
mypy_path = api
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True

follow_imports = silent

[mypy-api.app.routes.*]
[mypy-api.app.schemas.*]
ignore_errors = True

[mypy-api.app.models.*]
[mypy-api.app.core.routes.*]
ignore_errors = True


[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-fastapi_azure_auth.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True


ignore_missing_imports = True
